services:
  postgres:
    image: postgres:16-alpine
    container_name: procovar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: procovar_pedidos
      POSTGRES_USER: procovar
      POSTGRES_PASSWORD: procovar_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procovar -d procovar_pedidos"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    container_name: procovar-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8400
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://procovar:procovar_password@postgres:5432/procovar_pedidos?schema=public
      JWT_SECRET: change_this_super_secret_key
      CORS_ORIGIN: http://localhost:5000
      RUN_SEED: "true"
    ports:
      - "8400:8400"
    volumes:
      - api_uploads:/app/uploads

volumes:
  postgres_data:
  api_uploads:
