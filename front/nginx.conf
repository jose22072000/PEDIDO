server {
  listen 5000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy del API: el front hace fetch a /api/... (VITE_API_BASE_URL=/api) y
  # nginx lo reenvia al servicio pedido-api dentro de la red de Docker.
  # Espejo del proxy que ya usa el front de analitics.
  location /api/ {
    proxy_pass http://pedido-api:8400/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 50m;
  }
}
